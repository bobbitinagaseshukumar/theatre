# ═══════════════════════════════════════════════════════════
# Cinema Pro Max — Render Blueprint
# Provisions: Postgres database + Node/Express backend web service.
# Import via Render → New → Blueprint → select this repo.
# ═══════════════════════════════════════════════════════════
# Using Supabase Postgres — set DATABASE_URL manually in the Render dashboard.
# (If you prefer a Render-managed DB instead, restore a `databases:` block
#  and bind DATABASE_URL with `fromDatabase`.)
services:
  - type: web
    name: cinema-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    # `db push` syncs the Prisma schema to the DB, then `seed` loads sample data
    # (seed is idempotent — safe to run on every deploy), then the server starts.
    startCommand: npx prisma db push --skip-generate && node dist/seed.js && node dist/index.js
    healthCheckPath: /health
    envVars:
      # Supabase pooled URI (port 6543, ?pgbouncer=true) — set in Render dashboard
      - key: DATABASE_URL
        sync: false
      # Supabase direct/session URI (port 5432) — for prisma db push/migrations
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Set this to your Vercel URL after the frontend deploys (for CORS)
      - key: FRONTEND_URL
        sync: false
